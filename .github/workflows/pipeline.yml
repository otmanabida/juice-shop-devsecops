name: DevSecOps Juice Shop

on:
  push:
    branches: [ main ]

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. BUILD
      - name: Build Docker image
        run: docker build -t juice-shop .

      # 2. GITLEAKS (secrets)
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2

      # 3. SEMGREP (SAST)
      - name: Semgrep Scan
        uses: returntocorp/semgrep-action@v1

      # 4. TRIVY filesystem scan
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: json
          output: trivy-fs.json

      # 5. TRIVY image scan
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: juice-shop
          format: json
          output: trivy-image.json

      # 6. RUN CONTAINER (deploy test)
      - name: Run container
        run: docker run -d -p 3000:3000 --name juice juice-shop

      # 7. OWASP ZAP (DAST)
      - name: ZAP Scan
        run: |
          docker run --network host ghcr.io/zaproxy/zaproxy:stable \
          zap-baseline.py -t http://localhost:3000

      # 8. SAVE REPORTS
      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: .
